name: Publish and Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  publish-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: mymindstorm/setup-emsdk@v16

      - uses: actions/setup-node@v5
        with:
          node-version: '22.22.3'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest
      - run: corepack enable
      - run: corepack prepare yarn@4.15.0 --activate

      - uses: actions/cache@v5
        with:
          path: |
            bindings/wasm/.yarn/cache
            bindings/wasm/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('bindings/wasm/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Build and test C++
        # Capped at 2 jobs: unbounded parallelism OOM-kills cc1plus on the
        # hosted runners when compiling the large Debug test TUs.
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON
          cmake --build build --parallel 2
          python3 tools/scripts/k_weighting_reference.py
          ctest --test-dir build --output-on-failure --parallel

      - name: Install Node deps (WASM binding)
        working-directory: bindings/wasm
        run: yarn install --immutable
      - name: Build WASM binding
        working-directory: bindings/wasm
        run: yarn build
      - name: Lint WASM binding
        working-directory: bindings/wasm
        run: yarn lint
      - name: Test WASM binding
        working-directory: bindings/wasm
        run: yarn test

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish to npm
        working-directory: bindings/wasm
        run: npm publish --access public --provenance

  python-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            plat_tag: manylinux_2_17_x86_64
            lib_name: libsonare.so
          - os: ubuntu-24.04-arm
            arch: aarch64
            plat_tag: manylinux_2_17_aarch64
            lib_name: libsonare.so
          - os: macos-latest
            arch: arm64
            plat_tag: macosx_11_0_arm64
            lib_name: libsonare.dylib
          # macOS x86_64 omitted: GitHub no longer provides Intel macOS runners
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Eigen3 (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libeigen3-dev

      - name: Install Eigen3 (macOS)
        if: runner.os == 'macOS'
        run: brew install eigen

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Build shared library
        # Pin SONARE_WITH_FFMPEG=OFF for deterministic wheels: PyPI artifacts
        # must not depend on libavformat being present on the user's machine.
        # m4a/AAC users can rebuild from source with SONARE_FFMPEG=1.
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED=ON \
                         -DBUILD_TESTING=OFF -DBUILD_CLI=OFF \
                         -DSONARE_WITH_FFMPEG=OFF
          cmake --build build --config Release -j

      - name: Copy shared library
        run: cp build/lib/${{ matrix.lib_name }} bindings/python/src/libsonare/

      - name: Fix dylib install name (macOS)
        if: runner.os == 'macOS'
        run: install_name_tool -id @loader_path/libsonare.dylib bindings/python/src/libsonare/libsonare.dylib

      - name: Build wheel
        run: |
          cd bindings/python
          pip install wheel hatchling
          pip wheel . --no-deps -w dist/
          python3 -m wheel tags --platform-tag ${{ matrix.plat_tag }} --remove dist/*.whl

      - name: Test wheel
        run: |
          pip install bindings/python/dist/*.whl pytest
          python3 -c "import libsonare; print(f'Version: {libsonare.version()}')"
          cd bindings/python && python3 -m pytest tests/ -x -q

      - uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: bindings/python/dist/*.whl

  publish-pypi:
    needs: [python-wheels]
    if: always() && needs.python-wheels.result == 'success'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/libsonare
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: wheel-*
          path: dist/
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          # Tolerate re-runs of the tag workflow after a partial failure:
          # wheels already on PyPI are skipped instead of failing the job.
          skip-existing: true
