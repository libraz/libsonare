name: CI

on:
  push:
    branches: [main]
    tags-ignore: ['**']
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - 'NOTICE'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  clang-format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format
      - name: Check formatting
        run: |
          git ls-files -z -- '*.h' '*.hpp' '*.c' '*.cpp' ':!:third_party/**' |
            xargs -0 clang-format --dry-run --Werror

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bindings/wasm
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
        working-directory: .
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: bindings/wasm/yarn.lock
      - run: yarn install --immutable
      - run: yarn lint

  build-and-test:
    name: Native C++ (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential libeigen3-dev
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTING=ON -DBUILD_CLI=OFF -DSONARE_WITH_FFMPEG=OFF
      - name: Build
        # Capped at 2 jobs: unbounded parallelism OOM-kills cc1plus on the
        # hosted runners when compiling the large Debug test TUs.
        run: cmake --build build --parallel 2
      - name: Generate K-weighting reference fixture
        run: python3 tools/scripts/k_weighting_reference.py
      - name: Test
        run: ctest --test-dir build --output-on-failure --parallel

  sanitizer:
    name: ASan/UBSan (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang build-essential libeigen3-dev
      - name: Configure with sanitizers
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build-sanitize \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DBUILD_CLI=OFF \
            -DSONARE_WITH_FFMPEG=OFF \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" \
            -DCMAKE_SHARED_LINKER_FLAGS="-fsanitize=address,undefined"
      - name: Build
        # Capped at 2 jobs: sanitizer instrumentation makes the Debug test TUs
        # even heavier; unbounded parallelism OOM-kills the compiler.
        run: cmake --build build-sanitize --parallel 2
      - name: Generate K-weighting reference fixture
        run: python3 tools/scripts/k_weighting_reference.py
      - name: Test
        env:
          ASAN_OPTIONS: detect_leaks=1:strict_string_checks=1
          UBSAN_OPTIONS: print_stacktrace=1
        run: ctest --test-dir build-sanitize --output-on-failure --parallel
      # Windows is intentionally excluded: MSVC sanitizer coverage differs from
      # Clang/GCC ASan+UBSan and would make this gate inconsistent across OSes.

  coverage-wasm:
    name: Coverage + WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mymindstorm/setup-emsdk@v14
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
          cache-dependency-path: bindings/wasm/yarn.lock

      - name: Cache CMake dependencies
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: ${{ runner.os }}-cmake-deps-${{ hashFiles('CMakeLists.txt', 'tests/CMakeLists.txt') }}
          restore-keys: |
            ${{ runner.os }}-cmake-deps-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            build-essential \
            libeigen3-dev \
            lcov \
            ccache

      - name: Setup ccache
        run: |
          ccache --set-config=max_size=500M
          ccache --zero-stats

      - name: Configure CMake with coverage
        env:
          CC: ccache gcc
          CXX: ccache g++
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Debug \
            -DBUILD_TESTING=ON \
            -DENABLE_COVERAGE=ON

      - name: Build
        # Capped at 2 jobs: coverage instrumentation makes the Debug test TUs
        # even heavier; unbounded parallelism OOM-kills the compiler.
        run: cmake --build build --parallel 2

      - name: Show ccache statistics
        run: ccache --show-stats

      - name: Generate K-weighting reference fixture
        run: python3 tools/scripts/k_weighting_reference.py

      - name: Run C++ tests
        run: ctest --test-dir build --output-on-failure --parallel

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Audit optional fixture manifests
        run: |
          python -m py_compile \
            tests/fixtures/json_safe.py \
            tests/fixtures/audit_manifests.py \
            tests/fixtures/run_optional_fixture_report.py \
            tests/fixtures/evaluate_optional_fixture_targets.py \
            tests/fixtures/compare_optional_fixture_reports.py \
            tests/fixtures/realtime_voice_changer_parity.py \
            tests/fixtures/realtime_voice_changer_quality_gate.py
          python tests/fixtures/audit_manifests.py
      - name: Build shared library for Python fixture
        # The Python binding loads libsonare via dlopen; the static-library
        # build above can't satisfy that. Configure a second tree with
        # BUILD_SHARED=ON so we can exercise the realtime voice changer quality
        # gate without rebuilding the full coverage tree.
        run: |
          cmake -B build-shared \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_TESTING=OFF \
            -DBUILD_CLI=OFF \
            -DBUILD_SHARED=ON
          cmake --build build-shared --parallel --target sonare_shared
      - name: Type-check Python stubs
        working-directory: bindings/python
        run: |
          python -m pip install -e . mypy
          python -m mypy --strict ../../tests/typing/python_smoke.py
      - name: Realtime voice changer quality gate
        # Exercises every built-in preset on synthetic speech-like signals and
        # asserts LUFS / peak / throughput bands. Catches DSP regressions the
        # unit tests don't (e.g. envelope follower drift, preset metadata
        # mismatches). Uses the shared library built one step earlier.
        env:
          SONARE_LIB_DIR: ${{ github.workspace }}/build-shared/lib
        working-directory: bindings/python
        run: |
          # Resolve the platform-specific shared lib file inside the dir above.
          libpath="$(ls "$SONARE_LIB_DIR"/libsonare.so "$SONARE_LIB_DIR"/libsonare.dylib 2>/dev/null | head -n 1)"
          if [ -z "$libpath" ]; then
            echo "No shared sonare library found under $SONARE_LIB_DIR" >&2
            exit 1
          fi
          SONARE_LIB_PATH="$libpath" python ../../tests/fixtures/realtime_voice_changer_quality_gate.py

      - name: Type-check Node preset literals
        working-directory: bindings/node
        run: |
          yarn install --immutable
          yarn tsc --noEmit --ignoreConfig --strict --module NodeNext --moduleResolution NodeNext --target ES2022 --types node ../../tests/typing/node_smoke.ts

      - name: Generate coverage report
        run: |
          mkdir -p build/coverage
          lcov --directory build --capture --output-file build/coverage/coverage.info --ignore-errors source,gcov,negative
          lcov --extract build/coverage/coverage.info "${PWD}/src/*" --output-file build/coverage/coverage_filtered.info --ignore-errors unused,negative

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./build/coverage/coverage_filtered.info
          flags: unittests
          name: codecov-libsonare
          fail_ci_if_error: false

      - name: Install Node deps (WASM binding)
        working-directory: bindings/wasm
        run: yarn install --immutable
      - name: Build WASM binding
        working-directory: bindings/wasm
        run: yarn build
      - name: Test WASM binding
        working-directory: bindings/wasm
        run: yarn test
      - name: Report WASM size
        run: |
          mkdir -p build/reports
          baseline_args=()
          if [ -n "${WASM_BASELINE:-}" ]; then
            baseline_args=(--wasm-baseline "$WASM_BASELINE")
          fi
          python tests/fixtures/run_optional_fixture_report.py \
            --suite music \
            --sonare-tests build/bin/sonare_tests \
            --include-wasm-size \
            --wasm-current bindings/wasm/dist/sonare.wasm \
            "${baseline_args[@]}" \
            --output build/reports/wasm-size-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          report = json.loads(Path("build/reports/wasm-size-report.json").read_text())
          observations = [
              item
              for run in report["runs"]
              for item in run.get("observations", [])
              if item.get("metric") == "wasm_size"
          ]
          if len(observations) != 1:
              raise SystemExit("expected exactly one wasm_size observation")
          print(json.dumps(observations[0], sort_keys=True))
          PY
          if [ -n "${WASM_BASELINE:-}" ]; then
            python tests/fixtures/evaluate_optional_fixture_targets.py \
              build/reports/wasm-size-report.json \
              --metrics wasm_size \
              --require-metrics \
              --output build/reports/wasm-size-evaluation.json
          fi
      - name: Upload WASM size report
        uses: actions/upload-artifact@v4
        with:
          name: wasm-size-report
          path: build/reports/wasm-size-*.json
