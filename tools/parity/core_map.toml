# ---------------------------------------------------------------------------
# [func.<key>] — functions whose canonical defaults are C++ FREE-FUNCTION
# DEFAULT ARGUMENTS (no config struct), e.g. `float top_db = 80.0f`. The
# extractor reads the default args of `cpp_func` in `header` (merging overloads,
# dropping any param whose default disagrees across overloads). Same comparison
# as struct-backed entries; sample-rate / buffer params are role-stripped.
