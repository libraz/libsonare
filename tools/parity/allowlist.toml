# Parity-checker allowlist: intentional, reviewed divergences.
# See README.md for the meaning of each section and how to add an entry.
# Keys are the canonical snake_case names (C name without the `sonare_` prefix).

# ---------------------------------------------------------------------------
# [surface_only] — symbols with NO C-API counterpart that are intentional.
# These are platform-specific helpers, not coverage drift.
# Suffix/prefix wildcards (`*progress`, `engine_*`) are supported.
# ---------------------------------------------------------------------------
[surface_only]
# Symbols that exist on multiple bindings but are deliberately binding-only.
# The `mastering*` / `mix_stereo` / `onset_envelope` entries are ERGONOMIC
# facade free-function names for C operations that exist under a different
# (reordered) C name — see the matching [coverage] notes. Renaming the public
# facade API to mirror C is out of scope, so these are intentional, not drift:
#   mastering_pair_analyze   <- C mastering_analyze_pair
#   mastering_stereo_analyze <- C mastering_analyze_stereo
#   mastering_process_stereo <- C mastering_apply_processor_stereo
#   mastering_pair_process   <- C mastering_apply_pair_processor
#   mastering                <- high-level convenience wrapper (apply_processor)
#   mix_stereo               <- stereo mix convenience
#   onset_envelope           <- facade name for C onset_strength
#   validate_realtime_voice_changer_preset_json <- facade-side JSON validator
#                                                   (no C free function)
any = [
  "init",                  # WASM async module init
  "assert_samples",        # exported input validators (Node + WASM)
  "assert_finite_samples",
  "assert_finite_scalar",
  "assert_non_empty_samples",
  "mastering",
  "mastering_pair_analyze",
  "mastering_pair_process",
  "mastering_process_stereo",
  "mastering_stereo_analyze",
  "mix_stereo",
  "onset_envelope",
  "validate_realtime_voice_changer_preset_json",
]

node = [
  "analyze_async",          # libuv async variant, JS-only
  "analyze_with_progress",  # progress-callback variant, JS-only
  "*with_progress",
  "master_audio_async",         # libuv async variant, JS-only
  "master_audio_stereo_async",  # libuv async variant, JS-only
  # Node-only INTERNAL input/MIDI validation helpers exported from
  # bindings/node/src/validation.ts. Only the `ValidateOptions` TYPE is
  # re-exported through index.ts; these value functions are consumed by sibling
  # facade modules (project/scale/lufs), not part of the public C-mapped API and
  # have no C counterpart by design. (assert_samples / assert_finite_scalar /
  # assert_non_empty_samples / assert_finite_samples are covered by the shared
  # `any` list above; the rest are Node-specific MIDI helpers.)
  "assert_u7",
  "assert_nibble",
  "assert_u32",
  "assert_project_midi_events",
  "midi1_event",
]

wasm = [
  "require_module",         # WASM module-handle accessor
  "is_initialized",         # WASM init-state probe
  "engine_capabilities",    # WASM build capability descriptor
  "*with_progress",
  "analyze_with_progress",
]

python = [
  # Deprecated Python-only alias for `realtime_voice_changer_preset_config`
  # (which wraps C `sonare_realtime_voice_changer_preset_config`); kept for
  # backward compatibility, no C counterpart of its own. See
  # bindings/python/src/libsonare/_effects.py:1040.
  "realtime_voice_changer_preset_pod",
  # Progress-callback variant of analyze(), named without the C `_json_` infix
  # (it wraps C sonare_analyze_json_with_progress). Node/WASM expose the same
  # ergonomic name (see their surface_only blocks above).
  "analyze_with_progress",
]

# ---------------------------------------------------------------------------
# [coverage] — canonical C functions allowed to be ABSENT on a surface.
# Seed empty: we want to SURFACE coverage gaps, not pre-hide them. Add an
# entry only after confirming the omission is deliberate (e.g. file I/O in WASM).
# ---------------------------------------------------------------------------
[coverage]
# Example (disabled): wasm = ["audio_from_file"]
#
# --- C functions FOLDED INTO the base facade (extended / options variants) ---
# These C entry points are NOT separate facade functions: the base facade
# function exposes them through an options/mode argument or a callback, the same
# pattern as detect_chords -> detect_chords_ex (the template below).
#
#   detect_chords_ex: the facade `detect_chords` IS the extended form (it
#     exposes all SonareChordDetectionOptions fields and calls
#     sonare_detect_chords_ex). So the `_ex` variant is covered, not missing.
#   detect_key_with_options / _and_modes / _with_extended_options and the
#     detect_key_candidates_with_modes / _with_extended_options family: folded
#     into the facade `detect_key` / `detect_key_candidates` extended params
#     (modes / profile / genre_hint).
#   tempogram_with_mode: folded into `tempogram`'s `mode` selector.
#   mel_spectrogram_ex / mfcc_ex: C-ABI convenience variants that add an explicit
#     Mel range (fmin/fmax/htk) to the pure-C forward transform. The bindings
#     already expose the full Mel range through their native mel/mfcc config
#     objects, so the `_ex` form is covered by the base facade, not missing.
#   onset_strength: exposed by the facades under the ergonomic name
#     `onset_envelope`.
#   error_message / last_error_message: C-ABI error-string helpers consumed
#     internally by each facade's error layer (mapped to native exceptions),
#     not part of the public facade surface.
#
# --- mastering ops exposed under ERGONOMIC facade names (see [surface_only]) ---
#   mastering_analyze_pair / mastering_analyze_stereo / mastering_apply_processor
#   / mastering_apply_pair_processor / mastering_apply_processor_stereo: these C
#   operations are surfaced by the facade free functions mastering_pair_analyze /
#   mastering_stereo_analyze / mastering_process / mastering_pair_process /
#   mastering_process_stereo (listed in [surface_only] below). Same op, facade
#   spelling.
node = [
  "detect_chords_ex",
  "detect_key_with_options",
  "detect_key_with_options_and_modes",
  "detect_key_with_extended_options",
  "detect_key_candidates_with_modes",
  "detect_key_candidates_with_extended_options",
  "tempogram_with_mode",
  "mel_spectrogram_ex",
  "mfcc_ex",
  "onset_strength",
  "error_message",
  "last_error_message",
  "mastering_chain_with_progress",
  "mastering_chain_stereo_with_progress",
  "mastering_analyze_pair",
  "mastering_analyze_stereo",
  "mastering_apply_processor",
  "mastering_apply_pair_processor",
  "mastering_apply_processor_stereo",
  # Node folds these into a base free function via an extra parameter rather than
  # exposing a separately-named function (Python/WASM expose them by name):
  #   decompose_with_init            -> decompose(...) wraps sonare_decompose_with_init
  #   metering_vectorscope_decimated -> meteringVectorscope(left, right, sr, maxPoints)
  #   metering_phase_scope_decimated -> meteringPhaseScope(left, right, sr, maxPoints)
  # (metering_spectrum_frame IS exposed by name as meteringSpectrumFrame.)
  "decompose_with_init",
  "metering_phase_scope_decimated",
  "metering_vectorscope_decimated",
  # Unified-analysis variants folded into the base facade `analyze` (the rich
  # result IS what analyze() returns, serialized via sonare_analyze_json) and
  # `analyzeWithProgress` (the progress-callback variant). analyze_melody_ex is
  # folded into analyzeMelody's usePyin/center options.
  "analyze_json",
  "analyze_json_with_progress",
  "analyze_melody_ex",
  # C-ABI-internal length-checked inverse variants: bindings build their own
  # arrays with known lengths and call the base function, so the explicit-length
  # guards are not part of the binding surface.
  "mel_to_stft_checked",
  "mel_to_audio_checked",
  "mfcc_to_mel_checked",
  "mfcc_to_audio_checked",
]
wasm = [
  "detect_chords_ex",
  "detect_key_with_options",
  "detect_key_with_options_and_modes",
  "detect_key_with_extended_options",
  "detect_key_candidates_with_modes",
  "detect_key_candidates_with_extended_options",
  "tempogram_with_mode",
  "mel_spectrogram_ex",
  "mfcc_ex",
  "onset_strength",
  "error_message",
  "last_error_message",
  "mastering_analyze_pair",
  "mastering_analyze_stereo",
  "mastering_apply_processor",
  "mastering_apply_pair_processor",
  "mastering_apply_processor_stereo",
  # C-ABI-internal length-checked inverse variants (see node note above).
  "mel_to_stft_checked",
  "mel_to_audio_checked",
  "mfcc_to_mel_checked",
  "mfcc_to_audio_checked",
  # Unified-analysis variants folded into the base facade analyze /
