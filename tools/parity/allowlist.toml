# ---------------------------------------------------------------------------
# [order] — keys whose facade param order legitimately differs from the C ABI
# beyond the options-bag-prefix convention. Seed empty.
# ---------------------------------------------------------------------------
[order]
# scale_quantize_midi / scale_correction_semitones: C orders the optional
# reference pitch BEFORE the value being quantized (root, mode_mask,
# reference_midi, midi). All facades use the ergonomic order (root, mode_mask,
# midi, reference_midi=default) and remap to C order internally (verified in the
# addon / embind / ctypes wrappers).
#
# preemphasis / deemphasis: C is (coef, zi, use_zi); Node/WASM expose
# (coef, zi?) and derive use_zi from whether zi was supplied.
# tempogram: the facades expose a single `mode` selector (cyclic / fourier /
# autocorr) that folds the C `center` / `norm` flags; Node/WASM replace
# center+norm with `mode`, Python keeps center+norm and adds `mode`. Documented
# ergonomic convenience, not order drift.
# strip_meter (wasm/node): the C handle method `sonare_strip_meter` takes a
# `strip` handle; the facades follow the documented handle->index convention
# (the handle becomes a numeric `strip_index`) and add a `tap` metering-tap
# selector, the same extended-facade shape already accepted for strip_meter
# (python) below. Same op, handle->index + tap-selector — not order drift.
# lufs_interleaved: C is (samples, frames, channels, sample_rate). All facades
# expose (samples, channels, sample_rate) and DERIVE frames = len(samples) /
# channels internally — passing both an interleaved buffer and a redundant frame
# count would let them disagree. The frames-derived shape is the documented
# cross-binding convention; not order drift.
# chord_functional_analysis: C is (options-bag, key_root, key_mode); the facades
# put (key_root, key_mode) first and INLINE the SonareChordDetectionOptions
# fields after them — the same ergonomic options-inlining + key-first shape
# already used for detect_chords. Remapped internally; not order drift.
# analyze_melody (node/python): the facade appends the extended use_pyin/center
# params that map to C sonare_analyze_melody_ex; the base C analyze_melody lacks
# them. Folded extended-facade params, not order drift. (WASM passes them via an
# options object, so it is not flagged here.)
node = [
  "scale_quantize_midi",
  "scale_correction_semitones",
  "preemphasis",
  "deemphasis",
  "tempogram",
  "strip_meter",
  "lufs_interleaved",
  "chord_functional_analysis",
  "analyze_melody",
]
wasm = [
  "scale_quantize_midi",
  "scale_correction_semitones",
  "preemphasis",
  "deemphasis",
  "tempogram",
  "strip_meter",
  "lufs_interleaved",
  "chord_functional_analysis",
]

# detect_key_candidates (python): exposes `modes, profile, genre_hint` extras
# that map to the extended C variants (detect_key_candidates_with_modes /
# _with_extended_options). strip_meter (python): the extra `tap` selector maps
# to the metering-tap variant. Both are legitimate extended-facade params.
# scale_quantize_midi / scale_correction_semitones (python): same ergonomic
# (root, mode_mask, midi, reference_midi=default) order as Node/WASM above,
# remapped to the C order internally by the ctypes wrapper.
python = [
  "detect_key_candidates",
  "strip_meter",
  "tempogram",
  "scale_quantize_midi",
  "scale_correction_semitones",
  "lufs_interleaved",
  "chord_functional_analysis",
  "analyze_melody",
]

# ---------------------------------------------------------------------------
# [default] — "key.param" entries whose default may differ across facades.
# Seed empty: default drift is the highest-value signal; do not pre-hide it.
# ---------------------------------------------------------------------------
[default]
# Empty-collection sentinels (Node/WASM `[]` vs Python `None`, both meaning
# "no value") and enum-member-vs-string-union spellings (`SendTiming.POST_FADER`
# vs `postFader`) are folded to a common form in compare._default_drift /
# normalize.canonical_default, so they are NOT allowlisted per-key here. That
# covers mastering_streaming_preview.platforms, add_vca_group.members, and the
# add_send/meter_tap/strip_meter/schedule_*_automation enum defaults generally.
params = []

# ---------------------------------------------------------------------------
# [core_default] — "key.param" entries whose facade default is ALLOWED to differ
# from the C++ core config-struct field initializer (compare._core_default_drift,
# driven by core_map.toml). Use ONLY for an intentional facade-vs-core
# difference, e.g. a "0 = use library default" sentinel the facade exposes that
# the core struct spells as its concrete value. Seed empty: every mapped numeric
# / boolean default currently matches its core struct initializer.
# ---------------------------------------------------------------------------
[core_default]
params = []

# ---------------------------------------------------------------------------
# [enum] — "key.param" entries whose enum value-sets may differ across surfaces.
# TS unions often carry extra alias spellings (e.g. 'stereo-pan' + 'stereoPan')
# that the C enum lacks; add reviewed aliases here.
# ---------------------------------------------------------------------------
[enum]
params = []

# ---------------------------------------------------------------------------
# [input_naming] — canonical keys whose audio-input params (samples/sr/...) are
# allowed to be named differently across surfaces. Seed empty: input naming is
# real signal worth triaging.
# ---------------------------------------------------------------------------
[input_naming]
# WASM renames the primary feature-buffer input for clarity: `mel` -> `melPower`
# and `mfcc` -> `mfccCoefficients`. Same buffer, descriptive spelling — not a
# drift. (Node and C keep `mel` / `mfcc`.)
keys = ["mel_to_stft", "mel_to_audio", "mfcc_to_mel", "mfcc_to_audio"]

# ---------------------------------------------------------------------------
# [wasm_internal] — WASM embind / SonareModule / index.ts names whose
# intra-binding wiring inconsistency is intentional. This suppresses the ACTIVE
# legs (a free embind registration not in the SonareModule type, or an index.ts
# `module.X` call not in the type). The INFORMATIONAL "typed but no facade
# wrapper" leg is already non-gating, so the current cases (detectKey /
# detectKeyCandidates superseded by `_detectKeyWithOptions` / `_detectKeyCandidates`,
# and the unwrapped `mixerPresetJson`) need no entry here. Seed empty: a missing
# type declaration is a real TS break worth surfacing.
# ---------------------------------------------------------------------------
[wasm_internal]
# projectAbiVersion: the embind free function is reachable from TypeScript via
# the `ProjectModule` cast in index.ts (projectModule().projectAbiVersion(),
# guarded by a runtime `typeof candidate.projectAbiVersion !== 'function'`
# check). The generated `SonareModule` type only gains `projectAbiVersion` /
# `Project` after a WASM rebuild regenerates sonare.js.d.ts, so the facade
# deliberately does not depend on that type for the arrangement surface.
names = ["projectAbiVersion"]

# ---------------------------------------------------------------------------
# [tuning] — central knobs. Leave empty to use the built-in defaults in
# compare.py. Set these only to override.
#   input_roles:     leading audio-input param names stripped before the
#                    config-order comparison (and compared by the input check).
#   handle_prefixes: C name prefixes treated as handle/class APIs (coverage of
#                    these is informational; matched against facade class methods).
# ---------------------------------------------------------------------------
[tuning]
# input_roles = ["samples", "sample_rate", "sr", "left", "right", "mono", "audio", "x", "y", "buffer", "data", "length"]
# handle_prefixes = ["audio", "eq", "mixer", "engine", "strip", "stream", "streaming", "realtime", "voice", "free", "master"]
